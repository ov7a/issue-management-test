name: Check issues metadata

on:
  issues:
    types: [ opened, unlabeled, closed, milestoned, demilestoned ]

jobs:
  check_issue_metadata:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: gradle/issue-management-action/issue-metadata@1c493ba94e649f41147826b42f6fe563608a6966
